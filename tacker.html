<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./tacker.css">
  </head>
  <body>
   <div class="header">
    <p class="m-0">Expense<br>Tracker
    <img src="./sree.png" alt="" width="35px" heigth="35px"></p>
   </div>
   <div class="input-form"> 
   <div class="form-floating inputs  ">
            <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
            <label for="floatingInput">Amount</label>
          </div>
          <select class="form-select inputs" aria-label="Default select example">
            <option selected>Transaction Type</option>
            <option value="1">Income</option>
            <option value="2">Expense</option>
            
          </select>
          <div class="form-floating  inputs">
            <input type="date" class="form-control" id="floatingInput" placeholder="name@example.com">
            <label for="floatingInput">Date</label>
          </div>
          <button class="btn" id="add-button"> +</button>

   </div>

   <div class="cards mt-4">
    <div class="card" style="width: 18rem;">
        <div class="card-body">
          <h5 class="card-title"> Total Income
            <img src="./sree.png" alt=""width="35px">
          </h5>
          <h1 class="m-0">
            <img src="./12042830-silver-indian-rupee-symbol-3d-rendering.jpg" alt="" width="35px">
           <span id="toatalIncome" class="m-0">10,500</span>
          </h1>

          
        </div>
    </div>
    <div class="card" style="width: 18rem;">
        <div class="card-body">
          <h5 class="card-title"> Expense
            <img src="./sree.png" alt=""width="35px">
          </h5>
          <h1 class="m-0">
            <img src="./12042830-silver-indian-rupee-symbol-3d-rendering.jpg" alt="" width="35px">
           <span id="Expense" class="m-0">9,500</span>
          </h1>
            </div>
          </div>
          <div class="card" style="width: 18rem;">
            <div class="card-body">
              <h5 class="card-title"> Balance
                <img src="./sree.png" alt=""width="35px">
              </h5>
              <h1 class="m-0">
                <img src="./12042830-silver-indian-rupee-symbol-3d-rendering.jpg" alt="" width="35px">
               <span id="Balance" class="m-0">5,500</span>
              </h1>
            </div>
        </div>
    </div>
    <table class="Transaction-table mt-3">
        <tr id="header-row"> 
            <th> Amount</th>
            <th> Transaction Type</th>
            <th> Transaction Date</th>
            <th> Action</th>
        </tr>
        <tr>
            <td>10,500</td>
            <td>Income</td>
            <td> 26-04-2025</td>
            <td> <button class="btn btn-md delete-button">
                <img src="./images.jpeg" alt="" width="35px">

            </button> </td>

            </tr>
            <tr>
                <td>10,500</td>
                <td>Income</td>
                <td> 26-04-2025</td>
                <td> <button class="btn btn-md delete-button">
                    <img src="./images.jpeg" alt="" width="35px">
    
                </button> </td>
    
                </tr>
                <tr>
                    <td>4,500</td>
                    <td>Expense</td>
                    <td> 26-04-2025</td>
                    <td> <button class="btn btn-md delete-button">
                        <img src="./images.jpeg" alt="" width="35px">
        
                    </button> </td>
        
                    </tr>
                    <tr>
                        <td>7,500</td>
                        <td>Expense</td>
                        <td> 26-04-2025</td>
                        <td> <button class="btn btn-md delete-button">
                            <img src="./images.jpeg"
                             alt="" width="35px">
            
                        </button> </td>
            
                        </tr>
    </table>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.min.js" integrity="sha384-VQqxDN0EQCkWoxt/0vsQvZswzTHUVOImccYmSyhJTp7kGtPed0Qcx8rK9h9YEgx+" crossorigin="anonymous"></script>
  </body>
</html>
